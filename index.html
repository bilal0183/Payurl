  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- QRCode library -->

    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#09090f; color:#e2e8f0; }
    #root { min-height:100vh; }
    /* all other styles are defined inside the component via the `S` object */

<body>
  <div id="root"></div>
  <script type="text/babel">
    // ─── FULL REACT COMPONENT (fixed & self‑contained) ──────────────────────
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ─── QR CODE HOOK (robust) ──────────────────────────────────────────────
    function useQR(text, size = 200) {
      const containerRef = useRef(null);
      const qrInstance = useRef(null);

      useEffect(() => {
        if (!text || !containerRef.current) return;
        const container = containerRef.current;
        // Clear previous QR
        container.innerHTML = '';

        // QRCode constructor may not be available immediately; use a small delay
        const generate = () => {
          if (typeof QRCode === 'undefined') {
            setTimeout(generate, 200);
            return;
          }
          try {
            qrInstance.current = new QRCode(container, {
              text,
              width: size,
              height: size,
              colorDark: '#000000',
              colorLight: '#ffffff',
              correctLevel: QRCode.CorrectLevel.M,
            });
          } catch (e) {
            console.warn('QR generation error:', e);
          }
        };
        generate();
        return () => { if (qrInstance.current) { /* no cleanup needed */ } };
      }, [text, size]);

      return containerRef;
    }

    // ─── DATA ─────────────────────────────────────────────────────────────────
    const REGIONS = [
      { code:"JP", name:"Japan JP",          currency:"JPY", symbol:"¥",   amount:3000,   trial:false },

    const PLANS = [

    const LINK_TYPES = [

    const STAGES = ["Read Token","Check Proxy","OpenAI Checkout","Stripe Init","Rewrite Link"];

    // ─── SESSION JSON PARSER ─────────────────────────────────────────────────
    function parseSession(raw) {
      const t = raw.trim();
      if (!t) return null;
      try {
        const obj = JSON.parse(t);
        const email = obj.email || obj.user?.email || obj.user_info?.email || null;
        const name  = obj.name  || obj.user?.name  || obj.user_info?.name  || null;
        const region= obj.region|| obj.location    || null;
        const plan  = obj.plan  || obj.subscription?.plan || null;
        const accessToken = obj.accessToken || obj.access_token || obj.token || null;
        return { email, name, region, plan, accessToken, raw: obj };
      } catch {
        // JWT
        if (t.startsWith("ey") && t.length > 80) {
          try {
            const payload = JSON.parse(atob(t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/")));
            return {
              email: payload.email || payload.sub || null,
              name:  payload.name  || null,
              region:null,
              plan:  null,
              accessToken: t,
              raw: payload,
            };
          } catch { return { email:null, name:null, region:null, plan:null, accessToken:t, raw:null }; }
        }
        return { email:null, name:null, region:null, plan:null, accessToken:t, raw:null };
      }
    }

    // ─── COUNTDOWN HOOK ──────────────────────────────────────────────────────
    function useCountdown(seconds, active) {
      const [left, setLeft] = useState(seconds);
      useEffect(() => {
        if (!active) { setLeft(seconds); return; }
        const iv = setInterval(() => setLeft(p => Math.max(0, p - 1)), 1000);
        return () => clearInterval(iv);
      }, [active, seconds]);
      const mm = String(Math.floor(left / 60)).padStart(2,"0");
      const ss = String(left % 60).padStart(2,"0");
      return { left, display:`${mm}:${ss}`, expired: left === 0 };
    }

    // ─── QR DISPLAY COMPONENT ───────────────────────────────────────────────
    function QRDisplay({ text, size = 200 }) {
      const ref = useQR(text, size);
      return (
        <div
          ref={ref}
          style={{
            width: size, height: size,
            background: '#fff',
            borderRadius: '12px',
            overflow: 'hidden',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            boxShadow: '0 0 0 6px #fff, 0 0 0 8px #312e81',
            margin: '0 auto',
          }}
        />
      );
    }

    // ─── TOGGLE SWITCH ──────────────────────────────────────────────────────
    function Toggle({ on, onChange }) {
      return (
        <div style={{ width:36, height:20, background:on?'#7c3aed':'#1c1c30', borderRadius:10, position:'relative', cursor:'pointer', transition:'background 0.2s', flexShrink:0 }}

          <div style={{ width:14, height:14, background:'#fff', borderRadius:'50%', position:'absolute', top:3, left:on?19:3, transition:'left 0.2s' }} />
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────────
    function PayURLClone() {
      // Tabs
      const [activeTab, setActiveTab] = useState('main');

      // Token
      const [tokenRaw,     setTokenRaw]     = useState('');
      const [sessionInfo,  setSessionInfo]  = useState(null);
      const [tokenStatus,  setTokenStatus]  = useState('Token not recognized yet.');

      // Form
      const [plan,         setPlan]         = useState('plus');
      const [linkType,     setLinkType]     = useState('long');
      const [language,     setLanguage]     = useState('en');
      const [region,       setRegion]       = useState('DEFAULT');
      const [proxyPool,    setProxyPool]    = useState('1024proxy');
      const [customProxy,  setCustomProxy]  = useState('');
      const [stripeProxy,  setStripeProxy]  = useState('auto');
      const [customStripeP,setCustomStripeP]= useState('');
      const [proxyStatus,  setProxyStatus]  = useState('Proxy not checked.');
      const [proxyChecking,setProxyChecking]= useState(false);
      const [teamName,     setTeamName]     = useState('');
      const [seats,        setSeats]        = useState(2);
      const [promoCode,    setPromoCode]    = useState('');
      const [usePromo,     setUsePromo]     = useState(false);
      const [skipStripe,   setSkipStripe]   = useState(false);
      const [upiGuard,     setUpiGuard]     = useState(false);

      // Generation
      const [generating,   setGenerating]   = useState(false);
      const [progress,     setProgress]     = useState(0);
      const [currentStage, setCurrentStage] = useState('');
      const [result,       setResult]       = useState(null);
      const [upiResult,    setUpiResult]    = useState(null);
      const [error,        setError]        = useState(null);
      const [showRaw,      setShowRaw]      = useState(false);
      const [copied,       setCopied]       = useState('');

      // Payment status (for QR page)
      const [payStatus,    setPayStatus]    = useState('pending');
      const [checkingPay,  setCheckingPay]  = useState(false);

      const stopRef = useRef(false);

      // Countdown 5 min for QR/link
      const countdown = useCountdown(300, !!upiResult || !!result);

      // Stats (simulated)
      const [onlineUsers]    = useState(Math.floor(Math.random()*30)+12);
      const [totalGenerated] = useState(Math.floor(Math.random()*50000)+125000);
      const [proxyTraffic]   = useState((Math.random()*60+15).toFixed(1));

      // Token parse
      useEffect(() => {
        const t = tokenRaw.trim();
        if (!t) { setTokenStatus('Token not recognized yet.'); setSessionInfo(null); return; }
        const info = parseSession(t);
        setSessionInfo(info);
        if (info.email)        setTokenStatus(`✅ Recognized · ${info.email}${info.name ? ' ('+info.name+')' : ''}`);
        else if (info.accessToken && t.startsWith('ey')) setTokenStatus('✅ Access Token (JWT) – email not decoded');
        else if (t.length > 20) setTokenStatus('⚠️ Unknown format, will attempt anyway…');
        else setTokenStatus('Token not recognized yet.');
      }, [tokenRaw]);

      const regionObj = REGIONS.find(x => x.code === region) || REGIONS[7];

      // ── Clipboard paste ─────────────────────────────────────────────────────
      const pasteToken = async () => {
        try {
          const text = await navigator.clipboard.readText();
          setTokenRaw(text);
        } catch {
          alert('Cannot read clipboard — please paste manually.');
        }
      };

      // ── Proxy check ─────────────────────────────────────────────────────────
      const checkProxy = async () => {
        setProxyChecking(true);
        setProxyStatus('Checking…');
        await new Promise(r => setTimeout(r, 1600));
        setProxyStatus(customProxy ? `✅ Custom proxy OK: ${customProxy}` : `✅ ${proxyPool} pool healthy — IP assigned`);
        setProxyChecking(false);
      };

      // ── Generate ────────────────────────────────────────────────────────────
      const generate = async () => {
        if (!tokenRaw.trim()) {
          setError('Please enter your Access Token or Session JSON first.');
          return;
        }
        stopRef.current = false;
        setGenerating(true);
        setProgress(0);
        setResult(null);
        setUpiResult(null);
        setError(null);
        setCurrentStage('');
        setPayStatus('pending');

        const delays = [900, 700, 1300, 1000, 750];
        for (let i = 0; i < STAGES.length; i++) {
          if (stopRef.current) {
            setGenerating(false);
            setCurrentStage('Stopped');
            setProgress(0);
            return;
          }
          setCurrentStage(STAGES[i]);
          setProgress(Math.round((i / STAGES.length) * 100));
          await new Promise(r => setTimeout(r, delays[i]));
        }
        setProgress(100);
        setCurrentStage('Done');

        // Generate real‑looking results
        const sid = crypto.randomUUID ? crypto.randomUUID().replace(/-/g, '') : Math.random().toString(36).substr(2, 32);
        const short = Math.random().toString(36).substr(2, 12);

        if (linkType === 'upi') {
          const amount = regionObj.trial ? 0 : regionObj.amount;
          const upiStr = `upi://pay?pa=openai@axisbank&pn=OpenAI+India&am=${amount}&cu=INR&tn=ChatGPT+${plan.charAt(0).toUpperCase()+plan.slice(1)}+Subscription&tr=${sid.substr(0,12)}`;
          setUpiResult({
            upiStr, amount, sid,
            pa: 'openai@axisbank',
            pn: 'OpenAI India',
            tn: `ChatGPT ${plan.charAt(0).toUpperCase()+plan.slice(1)} Subscription`,
            email: sessionInfo?.email || 'unknown',
            gptRegion: sessionInfo?.region || region,
            stripeSession: `pi_${sid.substr(0,24)}`,
            raw: JSON.stringify({
              success: true,
              type: 'upi',
              upi_string: upiStr,
              pa: 'openai@axisbank',
              amount,
              currency: 'INR',
              plan,
              region,
              stripe_pi: `pi_${sid.substr(0,24)}`,
              expires_at: new Date(Date.now()+5*60*1000).toISOString(),
            }, null, 2),
          });
        } else {
          // Build a realistic payment URL
          const base = linkType === 'short'
            ? `https://pay.openai.com/s/${short}`
            : `https://pay.openai.com/c/pay/cs_live_${sid}#fidkdWxOYHwnPyd1blpxYHZxWjA0TFN3bHxRcWZnQnZVQnNuMEJXfVB1TGNLVFFgMXNxNkF3${short}==`;
          const amount = regionObj.trial ? 0 : regionObj.amount;
          setResult({
            url: base,
            plan,
            linkType,
            amount,
            region: regionObj.name,
            currency: regionObj.currency,
            symbol: regionObj.symbol,
            trial: regionObj.trial,
            email: sessionInfo?.email || 'unknown',
            stripeSession: `cs_live_${sid.substr(0,20)}`,
            raw: JSON.stringify({
              success: true,
              payment_url: base,
              plan,
              region,
              currency: regionObj.currency,
              amount,
              trial: regionObj.trial,
              stripe_session: `cs_live_${sid.substr(0,20)}`,
              email: sessionInfo?.email || null,
              expires_at: new Date(Date.now()+30*60*1000).toISOString(),
            }, null, 2),
          });
        }

        setGenerating(false);
      };

      const stop = () => { stopRef.current = true; };

      const copyText = (text, key) => {
        navigator.clipboard.writeText(text).then(() => {
          setCopied(key);
          setTimeout(() => setCopied(''), 2000);
        });
      };

      // ── Check payment status ──────────────────────────────────────────────
      const checkPayment = async () => {
        setCheckingPay(true);
        await new Promise(r => setTimeout(r, 1800));
        setPayStatus(Math.random() < 0.2 ? 'paid' : 'pending');
        setCheckingPay(false);
      };

      // ─── STYLES (condensed but identical) ──────────────────────────────────
      const S = {
        root: { minHeight: '100vh', background: '#09090f', color: '#e2e8f0', fontFamily: "'Segoe UI',system-ui,sans-serif", fontSize: '14px' },

        navTab: (a) => ({ padding: '13px 13px', cursor: 'pointer', color: a ? '#a78bfa' : '#4b5563', fontWeight: a ? 600 : 400, fontSize: '13px', background: 'none', border: 'none', borderBottom: a ? '2px solid #7c3aed' : '2px solid transparent', transition: 'color 0.15s' }),

        h1: { textAlign: 'center', margin: '0 0 4px', fontSize: '20px', fontWeight: 700, color: '#f1f5f9' },
        sub: { textAlign: 'center', fontSize: '11.5px', color: '#374151', marginBottom: '18px' },
        badge: { background: '#0c1425', border: '1px solid #1e3a5f', borderRadius: '8px', padding: '9px 13px', fontSize: '12px', color: '#60a5fa', marginBottom: '12px', lineHeight: 1.6 },
        privacy: { background: '#0d0d18', border: '1px solid #18182a', borderRadius: '8px', padding: '10px 13px', fontSize: '11.5px', color: '#374151', marginBottom: '14px', lineHeight: 1.6 },
        statsRow: { display: 'flex', gap: '10px', marginBottom: '16px', flexWrap: 'wrap' },
        stat: { flex: 1, minWidth: '120px', background: '#0d0d18', border: '1px solid #18182a', borderRadius: '10px', padding: '12px 14px' },
        statN: { fontSize: '19px', fontWeight: 700, color: '#a78bfa' },
        statL: { fontSize: '10px', color: '#374151', marginTop: '2px' },
        card: { background: '#0d0d18', border: '1px solid #18182a', borderRadius: '12px', padding: '16px', marginBottom: '12px' },
        secTitle: { fontSize: '11px', fontWeight: 600, color: '#4b5563', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '11px', paddingBottom: '7px', borderBottom: '1px solid #18182a' },
        label: { display: 'block', fontSize: '12px', color: '#9ca3af', marginBottom: '4px', fontWeight: 500 },
        input: { width: '100%', background: '#06060e', border: '1px solid #1c1c30', borderRadius: '7px', padding: '8px 11px', color: '#e2e8f0', fontSize: '13px', outline: 'none', boxSizing: 'border-box' },
        textarea: { width: '100%', background: '#06060e', border: '1px solid #1c1c30', borderRadius: '7px', padding: '9px 11px', color: '#e2e8f0', fontSize: '12px', outline: 'none', resize: 'vertical', minHeight: '72px', boxSizing: 'border-box', fontFamily: 'monospace', lineHeight: 1.5 },

        radioI: (dis) => ({ display: 'flex', alignItems: 'flex-start', gap: '8px', cursor: dis ? 'not-allowed' : 'pointer', opacity: dis ? 0.3 : 1, fontSize: '12.5px', userSelect: 'none' }),
        radio: { accentColor: '#7c3aed', marginTop: '2px', flexShrink: 0 },
        btnP: { background: 'linear-gradient(135deg,#7c3aed,#4338ca)', color: '#fff', padding: '11px 26px', borderRadius: '8px', border: 'none', cursor: 'pointer', fontSize: '14px', fontWeight: 700 },
        btnStop: { background: '#200a0a', color: '#f87171', padding: '11px 16px', borderRadius: '8px', border: '1px solid #7f1d1d', cursor: 'pointer', fontSize: '13px' },
        btnO: { background: 'transparent', border: '1px solid #1c1c30', color: '#9ca3af', padding: '7px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px' },
        btnG: { background: '#052e16', border: '1px solid #166534', color: '#4ade80', padding: '7px 13px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: 600 },
        btnPurpleSm: { background: '#5b21b6', color: '#fff', padding: '9px 18px', borderRadius: '8px', border: 'none', cursor: 'pointer', fontSize: '13px', fontWeight: 600 },
        btnDarkSm: { background: '#111', color: '#e2e8f0', padding: '9px 18px', borderRadius: '8px', border: '1px solid #333', cursor: 'pointer', fontSize: '13px', fontWeight: 600 },
        progressBar: { height: '5px', background: '#1a1a2e', borderRadius: '3px', overflow: 'hidden', marginTop: '10px' },

        resUrl: { wordBreak: 'break-all', fontSize: '11.5px', color: '#93c5fd', fontFamily: 'monospace', background: '#080814', padding: '10px', borderRadius: '6px', border: '1px solid #1e3a5f', lineHeight: 1.5 },

        qrPage: { background: '#fff', borderRadius: '16px', padding: '24px 20px 20px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '16px', marginTop: '10px', maxWidth: '340px', margin: '10px auto 0' },
        qrTimer: { fontSize: '18px', fontWeight: 700, color: '#7c3aed', textAlign: 'center' },

        qrBtns: { display: 'flex', gap: '10px', width: '100%', justifyContent: 'center' },
      };

      const stageIdx = STAGES.indexOf(currentStage);

      // ── Sub‑tabs: CPA, API ────────────────────────────────────────────────
      const CpaTab = () => {
        const [link, setLink] = useState('');
        const [res, setRes] = useState(null);
        const go = () => {
          if (!link.trim()) return;
          const id = Math.random().toString(36).substr(2, 16);
          setRes({
            fn: `chatgpt_payment_${id}.cpa`,
            b64: btoa(JSON.stringify({ payment_url: link, generated: new Date().toISOString(), id }))
          });
        };
        return (
          <div style={S.wrap}>

                </div>
                <div style={S.progressBar}><div style={S.progressFill(progress)} /></div>
                <div style={S.stageRow}>
                  {STAGES.map((s, i) => <span key={s} style={S.pill(s === currentStage, stageIdx > i)}>{s}</span>)}
                </div>
              </div>

              {/* Error */}
              {error && <div style={S.errBox}>❌ {error}</div>}

              {/* Results */}
              <UpiPage />
              <LinkPage />
            </div>
          )}
        </div>
      );
    }

    // ─── RENDER ──────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PayURLClone />);
  </script>
</body>
</html>
